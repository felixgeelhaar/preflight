version: 2

project_name: preflight

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: preflight
    main: ./cmd/preflight
    binary: preflight
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: felixgeelhaar
    name: preflight
  draft: false
  prerelease: auto
  make_latest: true
  name_template: "v{{.Version}}"

homebrew_casks:
  - name: preflight
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/felixgeelhaar/preflight"
    description: "Deterministic workstation compiler"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/preflight"]
          end

changelog:
  disable: true  # We use relicta for changelogs
