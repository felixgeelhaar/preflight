# nox configuration — the security/dependency gate that replaces dependabot.
# Schema reference: https://github.com/nox-hq/nox
#
# Only GENERATED, VENDORED, or PROSE/DATA artifacts are excluded here. All
# first-party Go source — including *_test.go — is scanned. The remaining
# first-party findings (fake credentials in test fixtures, capability
# *description* strings, help text naming env vars, doc URLs, CI permission
# blocks, test-only Dockerfile tags) are documented false positives accepted
# via .nox/baseline.json, never by blinding whole source directories.

scan:
  exclude:
    # Go module checksum database — SHA-256 module digests read as high-entropy
    # secrets/API keys to the entropy detector (7 medium FPs). Real dependency
    # CVEs are surfaced via OSV lookups on go.mod, not go.sum text.
    # Classification: False Positive (module digests). Last reviewed: 2026-07-11
    - go.sum
    - "**/go.sum"
    # npm lockfiles (docs website under website/): integrity hashes look like
    # API keys to the entropy detector. Dependency CVEs are surfaced via OSV
    # directly, not the lockfile text.
    # Classification: False Positive (integrity hashes). Last reviewed: 2026-07-11
    - "**/package-lock.json"
    # Markdown is prose — README, docs/, and the website/ content (Astro
    # Starlight). The secret/PII entropy rules fire on ordinary documentation
    # (e.g. the dotfiles guide's example paths trip SEC-004). High-confidence
    # real secret patterns are still caught in code, not prose.
    # Classification: False Positive (prose). Last reviewed: 2026-07-11
    - "*.md"
    - "**/*.md"
    # nox's own baseline/cache and report output — finding fingerprints are
    # SHA-256 hex that re-trip the secret detector. Never scan the scanner.
    # Classification: Acceptable Pattern (scanner state). Last reviewed: 2026-07-11
    - .nox/
    - findings.json
    - nox-results/
    - nox-baseline/
    - "**/*.sarif"
